<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  font-family: 'Segoe UI', Arial, sans-serif;
}

/* BUTTONS */
.format-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.fmt-btn {
  padding: 8px 20px;
  border-radius: 20px;
  border: 2px solid #555;
  background: #222;
  color: #fff;
  cursor: pointer;
}

.fmt-btn.active {
  background: #B71C1C;
  border-color: #B71C1C;
}

/* POSTER */
.poster {
  width: 100%;
  max-width: 420px;
  border-radius: 16px;
  overflow: hidden;
  background: #1a0a0a;
  color: #fff;
}

/* ✅ FIX PORTRAIT 9:16 */
.poster.portrait {
  aspect-ratio: 9 / 16;
}

/* ✅ FIX SQUARE */
.poster.square {
  aspect-ratio: 1 / 1;
}

/* CONTENT SCROLL SAFE */
.poster-inner {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* HEADER */
.status-bar {
  background: #FFD700;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  font-weight: 800;
  color: #1a0a0a;
}

/* GRID */
.blood-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 14px;
  flex: 1;
}

.blood-card {
  background: #2a1010;
  border-radius: 12px;
  padding: 14px;
}

.blood-letter {
  font-size: 42px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 8px;
}

.sub-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}

.sub-type { font-weight: 700; }

.badge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 800;
}

.critical { background:#B71C1C; }
.low { background:#E65100; }
.adequate { background:#4E342E; }
.good { background:#1B5E20; }

/* LEGEND */
.legend {
  display: flex;
  justify-content: center;
  gap: 12px;
  font-size: 12px;
  padding-bottom: 10px;
}

.dot {
  width:10px;height:10px;border-radius:50%;
  display:inline-block;margin-right:4px;
}

/* HOURS */
.hours { padding: 10px 14px; }
.sessions {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.session {
  background:#2a1010;
  text-align:center;
  padding:10px;
  border-radius:10px;
  color:#FFD700;
  font-weight:800;
}

/* APP */
.app {
  margin:10px 14px;
  padding:12px;
  border:1px solid #FFD700;
  border-radius:10px;
}

/* FOOTER */
.footer {
  background:#B71C1C;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
}

/* IG */
.ig {
  display:flex;
  align-items:center;
  gap:6px;
}

.ig svg {
  width:18px;
  height:18px;
  fill:#FFD700;
}

/* FIX TEXT WRAP */
.footer-left {
  display:flex;
  flex-direction:column;
}

.footer-right {
  text-align:right;
  color:#FFD700;
  font-weight:800;
}

/* MOBILE */
@media (max-width:480px){
  .blood-letter { font-size:34px; }
}
</style>
</head>

<body>

<div class="format-bar">
  <button class="fmt-btn active" onclick="setFmt('portrait',this)">Portrait</button>
  <button class="fmt-btn" onclick="setFmt('square',this)">Square</button>
</div>

<div class="poster portrait" id="poster">
<div class="poster-inner">

<!-- HEADER -->
<div class="status-bar">
  <div>Blood Status</div>
  <div>Updated Today</div>
</div>

<!-- ✅ ALL BLOOD TYPES RESTORED -->
<div class="blood-grid">
  <div class="blood-card">
    <div class="blood-letter">A</div>
    <div class="sub-row"><div>A+</div><div class="badge low">LOW</div></div>
    <div class="sub-row"><div>A-</div><div class="badge critical">CRITICAL</div></div>
  </div>

  <div class="blood-card">
    <div class="blood-letter">B</div>
    <div class="sub-row"><div>B+</div><div class="badge adequate">ADEQUATE</div></div>
    <div class="sub-row"><div>B-</div><div class="badge low">LOW</div></div>
  </div>

  <div class="blood-card">
    <div class="blood-letter">O</div>
    <div class="sub-row"><div>O+</div><div class="badge good">GOOD</div></div>
    <div class="sub-row"><div>O-</div><div class="badge critical">CRITICAL</div></div>
  </div>

  <div class="blood-card">
    <div class="blood-letter">AB</div>
    <div class="sub-row"><div>AB+</div><div class="badge adequate">ADEQUATE</div></div>
    <div class="sub-row"><div>AB-</div><div class="badge low">LOW</div></div>
  </div>
</div>

<!-- LEGEND -->
<div class="legend">
  <span><span class="dot" style="background:#EF5350"></span>Critical</span>
  <span><span class="dot" style="background:#FF7043"></span>Low</span>
  <span><span class="dot" style="background:#8D6E63"></span>Adequate</span>
  <span><span class="dot" style="background:#66BB6A"></span>Good</span>
</div>

<hr style="border:1px solid #3a1818; margin:0 14px;">

<!-- HOURS -->
<div class="hours">
  <div style="color:#FFD700;font-weight:800;margin-bottom:8px;">Opening Hours</div>
  <div class="sessions">
    <div class="session">8AM - 12PM</div>
    <div class="session">2PM - 5PM</div>
  </div>
</div>

<!-- APP -->
<div class="app">Book via Bloodkad App</div>

<!-- ✅ FIXED FOOTER -->
<div class="footer">

  <div class="footer-left">
    <div class="ig">
      <!-- REAL IG ICON -->
      <svg viewBox="0 0 24 24">
        <path d="M7 2C4.2 2 2 4.2 2 7v10c0 2.8 2.2 5 5 5h10c2.8 0 5-2.2 5-5V7c0-2.8-2.2-5-5-5H7zm5 5a5 5 0 110 10 5 5 0 010-10zm6.5-1.3a1.2 1.2 0 110 2.4 1.2 1.2 0 010-2.4z"/>
      </svg>
      bloodbank_ripas
    </div>
    <div>7440267 / 7440277</div>
  </div>

  <div class="footer-right">
    Donate Blood Save Lives
  </div>

</div>

</div>
</div>

<script>
function setFmt(type, btn){
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const poster = document.getElementById('poster');
  poster.className = 'poster ' + type;
}
</script>

</body>
</html>
