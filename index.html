<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  font-family: 'Segoe UI', Arial, sans-serif;
}

/* FORMAT BUTTONS */
.format-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.fmt-btn {
  padding: 8px 20px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 20px;
  border: 2px solid #555;
  cursor: pointer;
  background: #222;
  color: #fff;
}

.fmt-btn.active {
  background: #B71C1C;
  border-color: #B71C1C;
}

/* ✅ RESPONSIVE POSTER */
.poster {
  background: #1a0a0a;
  color: #fff;
  overflow: hidden;
  border-radius: 16px;
  width: 100%;
  max-width: 420px;
  transition: all 0.3s;
}

.poster.square {
  aspect-ratio: 1 / 1;
  overflow-y: auto;
}

/* HEADER */
.hdr { border-bottom: 4px solid #FFD700; }
.hdr-img { width: 100%; display: block; }

/* STATUS BAR */
.status-bar {
  background: #FFD700;
  padding: 11px 16px;
  display: flex;
  justify-content: space-between;
}

.status-label {
  font-size: 18px;
  font-weight: 800;
  color: #1a0a0a;
}

.status-date {
  font-size: 13px;
  font-weight: 700;
  color: #5D0000;
}

/* BLOOD GRID */
.blood-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 14px;
}

.blood-card {
  background: #2a1010;
  border-radius: 12px;
  padding: 14px 12px;
  border: 1.5px solid #3a1818;
}

.blood-letter {
  font-size: 44px;
  font-weight: 900;
  text-align: center;
  margin-bottom: 10px;
}

.sub-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 7px;
}

.sub-type {
  font-size: 17px;
  font-weight: 700;
  color: #ddd;
}

.badge {
  font-size: 12px;
  font-weight: 800;
  padding: 5px 11px;
  border-radius: 20px;
  text-transform: uppercase;
}

.badge.critical { background: #B71C1C; color:#fff; }
.badge.low { background: #E65100; color:#fff; }
.badge.adequate { background: #4E342E; color:#FFCCBC; }
.badge.good { background: #1B5E20; color:#C8E6C9; }

/* LEGEND */
.legend {
  display: flex;
  gap: 14px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 4px 14px 12px;
}

.leg-item {
  display: flex;
  gap: 5px;
  font-size: 13px;
  color: #ccc;
}

.dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
}

.dot.critical { background: #EF5350; }
.dot.low { background: #FF7043; }
.dot.adequate { background: #8D6E63; }
.dot.good { background: #66BB6A; }

.divider {
  border-top: 1.5px solid #3a1818;
  margin: 0 14px;
}

/* HOURS */
.hours-section { padding: 12px 14px; }

.sec-title {
  font-size: 16px;
  font-weight: 800;
  color: #FFD700;
  margin-bottom: 10px;
}

.sessions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.session-card {
  background: #2a1010;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.sess-time {
  font-size: 15px;
  font-weight: 800;
  color: #FFD700;
}

/* APP */
.app-section {
  margin: 0 14px 12px;
  background: #2a1010;
  border-radius: 10px;
  padding: 12px;
  border: 1px solid #FFD700;
}

/* FOOTER */
.footer {
  background: #B71C1C;
  padding: 13px 16px;
  display: flex;
  justify-content: space-between;
}

.footer-slogan {
  font-size: 14px;
  font-weight: 800;
  color: #FFD700;
}

/* MOBILE */
@media (max-width: 480px) {
  body { padding: 10px; }
  .blood-letter { font-size: 36px; }
  .sub-type { font-size: 15px; }
  .status-label { font-size: 16px; }
}

/* TABLET */
@media (min-width: 481px) and (max-width: 768px) {
  .poster { max-width: 500px; }
}

/* LARGE */
@media (min-width: 769px) {
  .poster { max-width: 600px; }
}
</style>
</head>

<body>

<div class="format-bar">
  <button class="fmt-btn active" onclick="setFmt('portrait',this)">Portrait</button>
  <button class="fmt-btn" onclick="setFmt('square',this)">Square</button>
</div>

<div class="poster portrait" id="poster">

  <div class="hdr">
    <!-- keep your original image here -->
    <img class="hdr-img" src="">
  </div>

  <div class="status-bar">
    <div class="status-label">Blood Status</div>
    <div class="status-date">Updated Today</div>
  </div>

  <div class="blood-grid">
    <div class="blood-card">
      <div class="blood-letter">A</div>
      <div class="sub-row"><div class="sub-type">A+</div><div class="badge low">Low</div></div>
      <div class="sub-row"><div class="sub-type">A-</div><div class="badge critical">Critical</div></div>
    </div>

    <div class="blood-card">
      <div class="blood-letter">B</div>
      <div class="sub-row"><div class="sub-type">B+</div><div class="badge adequate">Adequate</div></div>
      <div class="sub-row"><div class="sub-type">B-</div><div class="badge low">Low</div></div>
    </div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="dot critical"></div>Critical</div>
    <div class="leg-item"><div class="dot low"></div>Low</div>
    <div class="leg-item"><div class="dot adequate"></div>Adequate</div>
    <div class="leg-item"><div class="dot good"></div>Good</div>
  </div>

  <hr class="divider">

  <div class="hours-section">
    <div class="sec-title">Opening Hours</div>
    <div class="sessions">
      <div class="session-card"><div class="sess-time">8AM - 12PM</div></div>
      <div class="session-card"><div class="sess-time">2PM - 5PM</div></div>
    </div>
  </div>

  <div class="app-section">
    Book via Blood App
  </div>

  <div class="footer">
    <div>@bloodbank</div>
    <div class="footer-slogan">Donate Blood Save Lives</div>
  </div>

</div>

<script>
function setFmt(type, btn){
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const poster = document.getElementById('poster');
  poster.classList.remove('portrait','square');
  poster.classList.add(type);
}
</script>

</body>
</html>
